<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · VV TRAFFIC DATA</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="icon" href="/static/logo.png">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/logo.png" alt="VV Traffic Data Technology">
    </div>
    <div class="login-text">
      <h1 class="login-title">Sistema de Leads</h1>
      <p class="login-sub">VV Traffic Data · Technology</p>
    </div>

    {% if error %}
    <div class="login-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" action="/login" class="login-form" autocomplete="off">
      <input type="hidden" name="next" value="{{ next or '/' }}">
      <div class="form-group">
        <label>Utilizador</label>
        <input type="text" name="username" required autofocus autocomplete="username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn primary lg" type="submit" style="width: 100%; justify-content: center; margin-top: 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Entrar
      </button>
    </form>

    <div class="login-footer">
      Credenciais em <code>.env</code>
    </div>
  </div>
</div>

</body>
</html>
